            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.8em;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            opacity: 0.9;
            font-size: 0.95em;
        }
        
        .content-preview {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .content-preview h2 {
            color: #333;
            font-size: 1.2em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .content-preview .desc {
            color: #666;
            line-height: 1.6;
        }
        
        .content-preview .meta {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #ddd;
            font-size: 0.85em;
            color: #888;
        }
        
        .unlock-section {
            padding: 30px;
        }
        
        .unlock-section h3 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .password-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        
        .password-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .unlock-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .unlock-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .unlock-btn:active {
            transform: translateY(0);
        }
        
        .error-msg {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        .decrypted-content {
            display: none;
            padding: 30px;
        }
        
        .decrypted-content.show {
            display: block;
        }
        
        .decrypted-content pre {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.8;
        }
        
        .back-link {
            display: block;
            text-align: center;
            padding: 20px;
            color: #667eea;
            text-decoration: none;
            border-top: 1px solid #e9ecef;
            transition: background 0.2s;
        }
        
        .back-link:hover {
            background: #f8f9fa;
        }
        
        .lock-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
    </style>
</head>

        function decryptContent() {
            const password = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMsg');
            const decryptedContent = document.getElementById('decryptedContent');
            const contentText = document.getElementById('contentText');
            const unlockSection = document.getElementById('unlockSection');
            
            try {
                const decrypted = CryptoJS.AES.decrypt(encryptedData, password).toString(CryptoJS.enc.Utf8);
                
                if (decrypted && decrypted.length > 0) {
                    contentText.textContent = decrypted;
                    decryptedContent.classList.add('show');
                    unlockSection.style.display = 'none';
                    errorMsg.classList.remove('show');
                    
                    // 滚动到内容区域
                    decryptedContent.scrollIntoView({ behavior: 'smooth' });
                } else {
                    errorMsg.classList.add('show');
                }
            } catch (e) {
                errorMsg.classList.add('show');
            }
        }
        
        // 回车键解锁
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                decryptContent();
            }
        });
    </script>
