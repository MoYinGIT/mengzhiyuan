<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注销 - 默隐·蒙知苑</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { color: #333; font-size: 24px; margin-bottom: 16px; }
    p { color: #666; margin-bottom: 24px; line-height: 1.6; }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">👋</div>
    <h1>已安全退出</h1>
    <p>您已成功注销个人知识库访问权限。<br>如需再次访问，请重新登录。</p>
    <a href="./login.html" class="btn">重新登录</a>
  </div>

  <script>
    // 清除登录状态
    localStorage.removeItem('mzy_private_token');
    localStorage.removeItem('mzy_private_expires');
    sessionStorage.removeItem('mzy_redirect_url');
    console.log('🔓 已清除登录状态');
  </script>
</body>
</html>
