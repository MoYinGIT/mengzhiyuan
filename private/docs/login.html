<!--
  「默隐·蒙知苑」个人知识库 - 密码验证页面
  简单的静态加密方案，使用 SHA256 哈希验证
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>身份验证 - 默隐·蒙知苑</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .login-container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    
    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }
    
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    
    label {
      display: block;
      color: #555;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .error {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 15px;
      display: none;
    }
    
    .hint {
      margin-top: 20px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 13px;
      color: #666;
    }
    
    .hint-icon {
      margin-right: 6px;
    }
    
    /* 加载动画 */
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid #ffffff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    button.loading .spinner {
      display: block;
    }
    
    button.loading .btn-text {
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">🔐</div>
    <h1>个人知识库</h1>
    <p class="subtitle">默隐·蒙知苑 · 内部资料区域</p>
    
    <form id="loginForm">
      <div class="input-group">
        <label for="password">访问密码</label>
        <input type="password" id="password" placeholder="请输入访问密码" required>
      </div>
      
      <button type="submit">
        <span class="spinner"></span>
        <span class="btn-text">进入知识库</span>
      </button>
      
      <p class="error" id="errorMsg">密码错误，请重试</p>
    </form>
    
    <div class="hint">
      <span class="hint-icon">💡</span>
      此区域包含内部教案、学生档案等私密内容，仅限授权人员访问
    </div>
  </div>

  <script>
    // SHA256 哈希函数
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }
    
    // 验证密码（默认为 "mengzhiyuan2026" 的 SHA256 哈希）
    // 可通过修改此哈希值来更改密码
    const CORRECT_HASH = 'e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855'; // 空字符串哈希，需要修改
    
    // 实际使用请替换为以下密码的哈希值：
    // 默认密码: MoYin@2026
    // 哈希值: echo -n "MoYin@2026" | sha256sum
    const DEFAULT_HASH = 'c299bc881e4befcd4e80a984630196f00b8104ab9d5a9382792ac8ab8d4a0c87';
    
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const btn = document.querySelector('button');
      const errorMsg = document.getElementById('errorMsg');
      
      // 显示加载状态
      btn.classList.add('loading');
      btn.disabled = true;
      errorMsg.style.display = 'none';
      
      // 计算密码哈希
      const inputHash = await sha256(password);
      
      // 验证（支持多个预设密码）
      const validHashes = [DEFAULT_HASH];
      const isValid = validHashes.includes(inputHash);
      
      // 模拟网络延迟（增强安全性）
      await new Promise(resolve => setTimeout(resolve, 500));
      
      if (isValid) {
        // 存储验证令牌（30天有效期）
        const token = await sha256(password + Date.now());
        localStorage.setItem('mzy_private_token', token);
        localStorage.setItem('mzy_private_expires', Date.now() + 30 * 24 * 60 * 60 * 1000);
        
        // 跳转到首页
        window.location.href = './index.html';
      } else {
        btn.classList.remove('loading');
        btn.disabled = false;
        errorMsg.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });
    
    // 检查是否已登录
    window.addEventListener('load', function() {
      const token = localStorage.getItem('mzy_private_token');
      const expires = localStorage.getItem('mzy_private_expires');
      
      if (token && expires && Date.now() < parseInt(expires)) {
        // 已登录且未过期，直接跳转
        window.location.href = './index.html';
      }
    });
    
    // 回车键提交
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
      }
    });
  </script>
</body>
</html>
