<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人知识库 - 默隐·蒙知苑</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/guofeng-v2.css">
    <style>
        .lock-screen {
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(30,58,95,0.03) 0%, rgba(201,55,44,0.03) 100%);
        }
        
        .lock-card {
            background: white;
            border-radius: 16px;
            padding: 3rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
            position: relative;
        }
        
        .lock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--cinnabar), var(--ochre));
            border-radius: 16px 16px 0 0;
        }
        
        .lock-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: block;
        }
        
        .lock-title {
            font-family: var(--font-kai);
            font-size: 1.75rem;
            color: var(--indigo);
            margin-bottom: 0.5rem;
        }
        
        .lock-desc {
            color: var(--ink-300);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        
        .password-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid var(--border-light);
            border-radius: 8px;
            font-size: 1rem;
            font-family: var(--font-mono);
            text-align: center;
            letter-spacing: 0.3em;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }
        
        .password-input:focus {
            outline: none;
            border-color: var(--indigo);
            box-shadow: 0 0 0 3px rgba(30,58,95,0.1);
        }
        
        .unlock-btn {
            width: 100%;
            padding: 1rem;
            background: var(--indigo);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .unlock-btn:hover {
            background: var(--indigo-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(30,58,95,0.3);
        }
        
        .hint {
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--paper);
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--ink-300);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--indigo);
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/mengzhiyuan/portal/" class="brand">
                <span class="brand-icon">☯</span>
                <span class="brand-text">默隐·蒙知苑</span>
            </a>
            <div class="nav-links">
                <a href="/mengzhiyuan/portal/" class="nav-link">🏠 首页</a>
                <a href="/mengzhiyuan/student/" class="nav-link">🎓 学生</a>
                <a href="/mengzhiyuan/parent/" class="nav-link">👨‍👩‍👧 家长</a>
            </div>
        </div>
    </nav>

    <div class="lock-screen">
        <div class="lock-card">
            <span class="lock-icon">🔐</span>
            <h1 class="lock-title">个人知识库</h1>
            <p class="lock-desc">此区域包含内部教学资料，请输入密码继续</p>
            
            <input type="password" class="password-input" placeholder="请输入密码" id="password">
            <button class="unlock-btn" onclick="unlock()">🔓 解锁</button>
            
            <div class="hint">
                💡 提示：此区域仅限授权人员访问
            </div>
            
            <a href="/mengzhiyuan/portal/" class="back-link">← 返回首页</a>
        </div>
    </div>

    <script>
        function unlock() {
            const password = document.getElementById('password').value;
            // 这里保留原有的解密逻辑
            window.location.href = 'main.html?key=' + encodeURIComponent(password);
        }
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') unlock();
        });
    </script>
</body>
</html>
