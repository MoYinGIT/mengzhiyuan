name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd portal && npm install
          cd ../student && npm install
          cd ../parent && npm install
          cd ../private && npm install

      - name: Build Portal
        run: cd portal && npm run docs:build

      - name: Build Student
        run: cd student && npm run docs:build

      - name: Build Parent
        run: cd parent && npm run docs:build

      - name: Build Private
        run: cd private && npm run docs:build

      - name: Prepare dist
        run: |
          mkdir -p dist/portal dist/student dist/parent dist/private
          cp -r portal/docs/.vitepress/dist/* dist/portal/
          cp -r student/docs/.vitepress/dist/* dist/student/
          cp -r parent/docs/.vitepress/dist/* dist/parent/
          cp -r private/docs/.vitepress/dist/* dist/private/
          
          # 复制登录页面和验证脚本到private根目录
          cp private/docs/login.html dist/private/
          cp private/docs/public/auth-check.js dist/private/
          cp private/docs/public/robots.txt dist/private/
          
          # 创建首页重定向
          printf '%s\n' '<!DOCTYPE html>' '<html>' '<head>' '  <meta charset="utf-8">' '  <title>默隐·蒙知苑</title>' '  <link rel="icon" type="image/svg+xml" href="./portal/logo.svg">' '  <meta http-equiv="refresh" content="0; url=./portal/">' '</head>' '<body>' '  <p>正在跳转到总站门户... <a href="./portal/">点击这里</a></p>' '</body>' '</html>' > dist/index.html
          
          # 复制 favicon 到根目录，避免404
          cp portal/docs/public/logo.svg dist/favicon.svg
          cp portal/docs/public/logo.svg dist/favicon.ico || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
