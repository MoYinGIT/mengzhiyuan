<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ 指针基础演示 - 默隐·蒙知苑</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1em;
        }
        
        .demo-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 900px) {
            .demo-area {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .panel h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .panel h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #00d4ff;
            border-radius: 2px;
        }
        
        /* 代码编辑器样式 */
        .code-block {
            background: #0d1117;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.8;
            overflow-x: auto;
            border: 1px solid #30363d;
        }
        
        .code-line {
            display: flex;
            align-items: center;
            padding: 2px 0;
            transition: all 0.3s;
        }
        
        .line-num {
            color: #484f58;
            min-width: 30px;
            user-select: none;
        }
        
        .code-content {
            color: #c9d1d9;
        }
        
        .keyword { color: #ff7b72; }
        .type { color: #79c0ff; }
        .variable { color: #ffa657; }
        .number { color: #79c0ff; }
        .comment { color: #8b949e; }
        .operator { color: #ff7b72; }
        .string { color: #a5d6ff; }
        
        .highlight {
            background: rgba(255, 215, 0, 0.2);
            border-radius: 3px;
            padding: 2px 4px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { background: rgba(255, 215, 0, 0.2); }
            50% { background: rgba(255, 215, 0, 0.4); }
        }
        
        /* 内存可视化 */
        .memory-visual {
            background: #0d1117;
            border-radius: 10px;
            padding: 20px;
            min-height: 300px;
        }
        
        .memory-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        
        .memory-header {
            text-align: left;
            color: #8b949e;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .memory-row {
            transition: all 0.5s ease;
        }
        
        .memory-cell {
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
        }
        
        .address-cell {
            background: #21262d;
            color: #58a6ff;
            width: 150px;
        }
        
        .name-cell {
            background: #238636;
            color: #fff;
            width: 100px;
        }
        
        .value-cell {
            background: #1f6feb;
            color: #fff;
            width: 100px;
        }
        
        .pointer-arrow {
            display: inline-block;
            margin: 0 10px;
            color: #ffa657;
            font-size: 20px;
        }
        
        .explanation {
            background: rgba(0, 212, 255, 0.1);
            border-left: 4px solid #00d4ff;
            padding: 15px 20px;
            margin-top: 20px;
            border-radius: 0 10px 10px 0;
        }
        
        .explanation h3 {
            color: #00d4ff;
            margin-bottom: 10px;
        }
        
        .explanation p {
            color: #c9d1d9;
            line-height: 1.8;
        }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #238636, #2ea043);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(35, 134, 54, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 步骤指示器 */
        .steps {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            color: #888;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .step.active {
            background: #00d4ff;
            color: #000;
        }
        
        .step.completed {
            background: #238636;
            color: #fff;
        }
        
        /* 动画效果 */
        .fade-in {
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .arrow-animation {
            animation: arrowPulse 1s infinite;
        }
        
        @keyframes arrowPulse {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(5px); }
        }
        
        footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #666;
            font-size: 0.9em;
        }
        
        footer a {
            color: #00d4ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔷 C++ 指针基础演示</h1>
            <p class="subtitle">理解「地址」与「解引用」的本质 | 默隐·蒙知苑</p>
        </header>
        
        <!-- 步骤指示器 -->
        <div class="steps">
            <div class="step active" id="step1">1</div>
            <div class="step" id="step2">2</div>
            <div class="step" id="step3">3</div>
            <div class="step" id="step4">4</div>
            <div class="step" id="step5">5</div>
        </div>
        
        <div class="demo-area">
            <!-- 左侧：代码 -->
            <div class="panel">
                <h2>代码视图</h2>
                <div class="code-block">
                    <div class="code-line" id="line1">
                        <span class="line-num">1</span>
                        <span class="code-content"><span class="type">int</span> <span class="variable">num</span> <span class="operator">=</span> <span class="number">42</span><span class="operator">;</span></span>
                    </div>
                    <div class="code-line" id="line2">
                        <span class="line-num">2</span>
                        <span class="code-content"></span>
                    </div>
                    <div class="code-line" id="line3">
                        <span class="line-num">3</span>
                        <span class="code-content"><span class="comment">// & 是取地址运算符</span></span>
                    </div>
                    <div class="code-line" id="line4">
                        <span class="line-num">4</span>
                        <span class="code-content"><span class="type">int</span><span class="operator">*</span> <span class="variable">ptr</span> <span class="operator">=</span> <span class="operator">&</span><span class="variable">num</span><span class="operator">;</span></span>
                    </div>
                    <div class="code-line" id="line5">
                        <span class="line-num">5</span>
                        <span class="code-content"></span>
                    </div>
                    <div class="code-line" id="line6">
                        <span class="line-num">6</span>
                        <span class="code-content"><span class="comment">// * 是解引用运算符</span></span>
                    </div>
                    <div class="code-line" id="line7">
                        <span class="line-num">7</span>
                        <span class="code-content">cout <span class="operator"><<</span> <span class="operator">*</span><span class="variable">ptr</span> <span class="operator"><<</span> endl<span class="operator">;</span></span>
                    </div>
                </div>
                
                <div class="explanation" id="explanation">
                    <h3>💡 当前步骤说明</h3>
                    <p id="explanation-text">
                        点击「下一步」开始探索 C++ 指针的奥秘...
                    </p>
                </div>
            </div>
            
            <!-- 右侧：内存可视化 -->
            <div class="panel">
                <h2>内存视图</h2>
                <div class="memory-visual">
                    <table class="memory-table">
                        <thead>
                            <tr>
                                <th class="memory-header">内存地址</th>
                                <th class="memory-header">变量名</th>
                                <th class="memory-header">存储的值</th>
                            </tr>
                        </thead>
                        <tbody id="memory-body">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>
                
                <!-- 控制按钮 -->
                <div class="controls">
                    <button class="btn btn-secondary" id="prevBtn" onclick="prevStep()" disabled>⬅ 上一步</button>
                    <button class="btn btn-primary" id="nextBtn" onclick="nextStep()">下一步 ➡</button>
                    <button class="btn btn-secondary" onclick="resetDemo()">🔄 重置</button>
                </div>
            </div>
        </div>
        
        <footer>
            <p>© 2026 默隐·蒙知苑 | 让所有孩子有处可学</p>
            <p style="margin-top:10px;">💡 提示：将此页面嵌入 iframe 即可集成到您的网站</p>
        </footer>
    </div>

    <script>
        let currentStep = 0;
        const totalSteps = 5;
        
        const explanations = [
            {
                title: "准备开始",
                text: "我们将通过 5 个步骤，理解 C++ 指针的核心概念：「地址」与「解引用」。<br><br>🔹 <b>指针</b> = 存储「内存地址」的变量"
            },
            {
                title: "步骤 1：声明普通变量",
                text: "我们声明了一个 <code>int</code> 类型的变量 <code>num</code>，并赋值为 <code>42</code>。<br><br>📍 计算机在内存中为 <code>num</code> 分配了一块空间，假设地址是 <code>0x1000</code>。<br><br>💾 这块空间里存储的值是 <code>42</code>。"
            },
            {
                title: "步骤 2：取地址 &",
                text: "<code>&</code> 是「取地址运算符」。<br><br><code>&num</code> 表示获取变量 <code>num</code> 的内存地址，即 <code>0x1000</code>。<br><br>🔑 关键理解：每个变量在内存中都有唯一的地址！"
            },
            {
                title: "步骤 3：声明指针变量",
                text: "我们声明了一个指针变量 <code>ptr</code>：<br><br><code>int* ptr = &num;</code><br><br>🔹 <code>int*</code> 表示「指向 int 的指针类型」<br>🔹 <code>ptr</code> 存储的是 <code>num</code> 的地址 <code>0x1000</code><br><br>📍 指针 <code>ptr</code> 自己也有一个地址（假设 <code>0x2000</code>）"
            },
            {
                title: "步骤 4：解引用 *",
                text: "<code>*</code> 是「解引用运算符」。<br><br><code>*ptr</code> 表示「获取 ptr 指向地址中存储的值」。<br><br>🔹 <code>ptr</code> 存储 <code>0x1000</code><br>🔹 <code>0x1000</code> 地址中的值是 <code>42</code><br>🔹 所以 <code>*ptr = 42</code><br><br>✨ <b>口诀：*ptr = 跟随指针，取出内容</b>"
            },
            {
                title: "完成！核心总结",
                text: "🎯 <b>指针两大核心操作：</b><br><br>1️⃣ <code>&变量</code> = 取地址（变量住哪？）<br>2️⃣ <code>*指针</code> = 解引用（取出内容）<br><br>🔄 <b>关系图：</b><br><code>ptr</code> → 存储地址 <code>0x1000</code> → 指向 <code>num</code> → 值是 <code>42</code><br><br>💡 <code>*ptr</code> 就是 <code>num</code> 的别名！"
            }
        ];
        
        function updateStep() {
            // 更新步骤指示器
            for (let i = 1; i <= totalSteps; i++) {
                const stepEl = document.getElementById(`step${i}`);
                stepEl.classList.remove('active', 'completed');
                if (i < currentStep) {
                    stepEl.classList.add('completed');
                } else if (i === currentStep) {
                    stepEl.classList.add('active');
                }
            }
            
            // 更新按钮状态
            document.getElementById('prevBtn').disabled = currentStep <= 0;
            document.getElementById('nextBtn').disabled = currentStep >= totalSteps;
            document.getElementById('nextBtn').textContent = 
                currentStep >= totalSteps ? '已完成 ✅' : '下一步 ➡';
            
            // 更新说明
            const exp = explanations[currentStep];
            document.querySelector('.explanation h3').textContent = `💡 ${exp.title}`;
            document.getElementById('explanation-text').innerHTML = exp.text;
            
            // 更新代码高亮
            updateCodeHighlight();
            
            // 更新内存视图
            updateMemoryView();
        }
        
        function updateCodeHighlight() {
            // 清除所有高亮
            document.querySelectorAll('.code-line').forEach(line => {
                line.classList.remove('highlight');
            });
            
            // 根据步骤高亮相应代码
            const highlights = {
                1: ['line1'],
                2: ['line3', 'line4'],
                3: ['line4'],
                4: ['line6', 'line7'],
                5: ['line1', 'line4', 'line7']
            };
            
            if (highlights[currentStep]) {
                highlights[currentStep].forEach(id => {
                    document.getElementById(id).classList.add('highlight');
                });
            }
        }
        
        function updateMemoryView() {
            const tbody = document.getElementById('memory-body');
            tbody.innerHTML = '';
            
            if (currentStep === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#666;padding:50px;">内存为空<br>点击「下一步」开始</td></tr>';
                return;
            }
            
            // 步骤1：只有 num
            if (currentStep >= 1) {
                const row = document.createElement('tr');
                row.className = 'memory-row fade-in';
                row.innerHTML = `
                    <td class="memory-cell address-cell">0x1000</td>
                    <td class="memory-cell name-cell">num</td>
                    <td class="memory-cell value-cell">42</td>
                `;
                tbody.appendChild(row);
            }
            
            // 步骤2-3：显示取地址过程
            if (currentStep >= 2) {
                const arrowRow = document.createElement('tr');
                arrowRow.className = 'fade-in';
                arrowRow.innerHTML = `
                    <td colspan="3" style="text-align:center;padding:10px;color:#ffa657;font-size:18px;">
                        <span class="arrow-animation">↑ &num 获取这个地址</span>
                    </td>
                `;
                tbody.appendChild(arrowRow);
            }
            
            // 步骤3-5：显示指针 ptr
            if (currentStep >= 3) {
                const row = document.createElement('tr');
                row.className = 'memory-row fade-in';
                row.innerHTML = `
                    <td class="memory-cell address-cell">0x2000</td>
                    <td class="memory-cell name-cell">ptr</td>
                    <td class="memory-cell value-cell" style="background:#ffa657;">
                        0x1000 <span class="pointer-arrow">→</span> num
                    </td>
                `;
                tbody.appendChild(row);
            }
            
            // 步骤4-5：显示解引用
            if (currentStep >= 4) {
                const arrowRow = document.createElement('tr');
                arrowRow.className = 'fade-in';
                arrowRow.innerHTML = `
                    <td colspan="3" style="text-align:center;padding:10px;color:#00d4ff;font-size:18px;">
                        <span class="arrow-animation">*ptr 跟随箭头 → 取出值 42</span>
                    </td>
                `;
                tbody.appendChild(arrowRow);
            }
            
            // 步骤5：总结
            if (currentStep >= 5) {
                const summaryRow = document.createElement('tr');
                summaryRow.className = 'fade-in';
                summaryRow.innerHTML = `
                    <td colspan="3" style="padding:15px;background:rgba(0,212,255,0.1);border-radius:8px;">
                        <div style="color:#00d4ff;font-weight:bold;margin-bottom:10px;">🔗 关系链：</div>
                        <div style="font-family:monospace;color:#c9d1d9;">
                            ptr (0x2000) → [存储 0x1000] → 指向 num (0x1000) → [存储 42]<br><br>
                            <span style="color:#ffa657;">*ptr == num == 42</span> ✓
                        </div>
                    </td>
                `;
                tbody.appendChild(summaryRow);
            }
        }
        
        function nextStep() {
            if (currentStep < totalSteps) {
                currentStep++;
                updateStep();
            }
        }
        
        function prevStep() {
            if (currentStep > 0) {
                currentStep--;
                updateStep();
            }
        }
        
        function resetDemo() {
            currentStep = 0;
            updateStep();
        }
        
        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextStep();
            if (e.key === 'ArrowLeft') prevStep();
        });
        
        // 初始化
        updateStep();
    </script>
</body>
</html>
