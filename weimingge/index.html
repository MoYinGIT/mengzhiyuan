<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微明阁·竞赛 - 默隐·蒙知苑</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/guofeng-v2.css">
    <style>
        .lock-screen {
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(107,76,122,0.05) 0%, rgba(30,58,95,0.05) 100%);
        }
        
        .lock-card {
            background: white;
            border-radius: 16px;
            padding: 3rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
            position: relative;
        }
        
        .lock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--purple), var(--indigo));
            border-radius: 16px 16px 0 0;
        }
        
        .temple-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: block;
        }
        
        .temple-name {
            font-family: var(--font-kai);
            font-size: 2rem;
            color: var(--purple);
            margin-bottom: 0.5rem;
        }
        
        .temple-subtitle {
            color: var(--ochre);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        
        .temple-desc {
            color: var(--ink-300);
            margin-bottom: 2rem;
            font-size: 0.95rem;
            line-height: 1.8;
        }
        
        .password-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid var(--border-light);
            border-radius: 8px;
            font-size: 1rem;
            font-family: var(--font-mono);
            text-align: center;
            letter-spacing: 0.3em;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }
        
        .password-input:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(107,76,122,0.1);
        }
        
        .enter-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--purple), var(--indigo));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(107,76,122,0.4);
        }
        
        .hint {
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--paper);
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--ink-300);
        }
        
        .hint strong {
            color: var(--purple);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--indigo);
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--ink-300);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/mengzhiyuan/portal/" class="brand">
                <span class="brand-icon">☯</span>
                <span class="brand-text">默隐·蒙知苑</span>
            </a>
            <div class="nav-links">
                <a href="/mengzhiyuan/portal/" class="nav-link">🏠 首页</a>
                <a href="/mengzhiyuan/student/" class="nav-link">🎓 学生</a>
                <a href="/mengzhiyuan/parent/" class="nav-link">👨‍👩‍👧 家长</a>
            </div>
        </div>
    </nav>

    <div class="lock-screen">
        <div class="lock-card">
            <span class="temple-icon">🏛️</span>
            <h1 class="temple-name">微明阁</h1>
            <p class="temple-subtitle">☯ 算法竞赛核心密档</p>
            
            <div class="features">
                <span class="feature-item">🏆 CSP-J/S</span>
                <span class="feature-item">🥇 NOIP</span>
                <span class="feature-item">👑 NOI</span>
            </div>
            
            <p class="temple-desc">
                收录算法竞赛核心知识点、高级数据结构、经典算法模板。
                <br>
                仅限授权学员访问，可分享给指定学员。
            </p>
            
            <input type="password" class="password-input" placeholder="请输入阁钥" id="password">
            <button class="enter-btn" onclick="enter()">🚪 入阁</button>
            
            <div class="hint">
                💡 <strong>须知</strong>：此阁收录竞赛级核心内容，
                需完成C++ L4以上方可入内研习
            </div>
            
            <a href="/mengzhiyuan/portal/" class="back-link">← 返回首页</a>
        </div>
    </div>

    <script>
        function enter() {
            const password = document.getElementById('password').value;
            window.location.href = 'main.html?key=' + encodeURIComponent(password);
        }
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') enter();
        });
    </script>
</body>
</html>
