<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微明阁·竞赛</title>
    <meta name="description" content="IOI/NOI 竞赛知识库 - 七卷106陷阱">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #1890ff;
            --primary-dark: #096dd9;
            --bg: #f0f2f5;
            --card-bg: #fff;
            --text: #333;
            --text-secondary: #666;
            --border: #e8e8e8;
            --error: #ff4d4f;
            --success: #52c41a;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #141414;
                --card-bg: #1f1f1f;
                --text: #e8e8e8;
                --text-secondary: #a6a6a6;
                --border: #434343;
            }
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 480px;
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .lock-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .description {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background: var(--card-bg);
            color: var(--text);
            transition: border-color 0.3s;
        }
        
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.1s;
        }
        
        .btn:hover {
            opacity: 0.9;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .error {
            color: var(--error);
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 16px;
        }
        
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="lock-icon">📚</div>
                <h1>微明阁·竞赛</h1>
                <p class="description">IOI/NOI 竞赛知识库<br>七卷 · 106个陷阱 · 21400字</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">请输入访问密码</label>
                    <input type="password" id="password" placeholder="访问密码" required>
                </div>
                
                <button type="submit" class="btn" id="submitBtn">解锁内容</button>
                
                <div class="error" id="errorMsg">密码错误，请重试</div>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <div>正在验证...</div>
                </div>
            </form>
        </div>
        
        <div class="footer">
            🔒 SHA256 加密验证 · 明夷加密静态部署工具
        </div>
    </div>
    
    <script>
        // SHA256 哈希函数
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        // 验证密码
        // 密码: weiming2026
        // 哈希值: echo -n "weiming2026" | sha256sum
        const CORRECT_HASH = 'a3f5565506edc303c9a93b3c93ee8458746e4a377c81addafbc3bc994b98126b';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const loading = document.getElementById('loading');
            
            // 显示加载状态
            btn.disabled = true;
            errorMsg.style.display = 'none';
            loading.style.display = 'block';
            
            // 计算密码哈希
            const inputHash = await sha256(password);
            
            // 验证
            const isValid = inputHash === CORRECT_HASH;
            
            // 模拟网络延迟（增强安全性）
            await new Promise(resolve => setTimeout(resolve, 500));
            
            if (isValid) {
                // 存储验证令牌（7天有效期）
                const token = await sha256(password + Date.now());
                localStorage.setItem('weimingge_token', token);
                localStorage.setItem('weimingge_expires', Date.now() + 7 * 24 * 60 * 60 * 1000);
                
                // 跳转到内容页
                window.location.href = 'content.html';
            } else {
                btn.disabled = false;
                loading.style.display = 'none';
                errorMsg.style.display = 'block';
            }
        });
        
        // 禁用右键
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
