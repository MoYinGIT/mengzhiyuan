            vol1: `# 卷一·IO层：输入输出的暗面与真相

> **卷首语**：
> 
> 「cin >>」四字看似简单，实则暗藏杀机。
> 多少人因一个空格WA，因一次TLE饮恨赛场。
> 此卷所录，皆为实战中血与泪换来的教训。

## 1.1 cin >> 的隐藏缓冲区

### 陷阱

cin 在读取字符串时，会以**空白字符**（空格、换行、制表符）作为分隔符。

### 错误示例

\`\`\`cpp
string s;
cin >> s;  // 输入 "hello world"，s 只得到 "hello"
\`\`\`

### 正确方案

\`\`\`cpp
// 方案1：使用 getline 读取整行
string s;
getline(cin, s);  // s = "hello world"

// 方案2：循环读取所有单词
string word;
while (cin >> word) {
    // 处理每个单词
}
\`\`\`

## 1.2 getline 与 cin 混用的灾难

### 陷阱

cin >> 会在输入流中留下换行符，随后调用 getline 会读取到这个空行。

### 错误示例

\`\`\`cpp
int n;
string s;
cin >> n;      // 输入 42\n，\n 留在缓冲区
getline(cin, s); // s = ""（空行！）
\`\`\`

### 正确方案

\`\`\`cpp
int n;
string s;
cin >> n;
cin.ignore();    // 清除缓冲区中的换行符
getline(cin, s); // 正常工作
\`\`\`

## 2.1 有符号整数的溢出

### 陷阱

有符号整数溢出是**未定义行为**（UB），编译器可以优化掉你的代码。

### 错误示例

\`\`\`cpp
int x = 1e9;
x *= 2;  // UB! 结果不可预测
\`\`\`

### 正确方案

\`\`\`cpp
// 使用 long long
long long x = 1e9;
x *= 2;  // OK: 2e9

// 或使用 int64_t
int64_t y = 1e9;
y *= 2;
\`\`\`

## 6.1 时间分配的黄金比例

### 🕳️ 陷阱描述

时间分配不合理——在某道题上死磕太久，或简单题花费过多时间，导致整体得分不理想。

### ✅ 正确策略

| 时间段 | 行动 | 目标 |
|:---|:---|:---|
| 0-10分钟 | **通读所有题目** | 评估难度，确定做题顺序 |
| 10-30分钟 | 快速解决最简单题 | 确保基础分到手 |
| 30-70分钟 | 主攻中等难度题 | 争取AC或高分 |
| 70-100分钟 | 挑战难题或完善代码 | 冲击高分 |
| 100-120分钟 | 检查、测试、提交 | 防低级错误 |

---

## 6.2 死磕一题的沉没成本

### 🕳️ 陷阱描述

在一道题上投入过多时间后，不甘心放弃，继续投入更多时间，形成恶性循环。

### ✅ 断舍离策略

\`\`\`cpp
// 设定硬性时间上限
const int TIME_LIMIT_PER_PROBLEM = 45; // 分钟

// 记住：两道题的部分分 > 一道题的AC
\`\`\`

---

## 6.3 部分分的重要性

### 🕳️ 陷阱描述

只追求正解，忽视部分分策略；或在不会正解时直接放弃整道题。

### ✅ 部分分策略

\`\`\`cpp
// 策略：能拿的分都拿
int solve() {
    if (n <= 20) return bruteForce();  // 20分保底
    if (isSpecialCase()) return specialSolution();  // +20分
    if (canUseSimpleAlgo()) return simpleAlgo();  // +30分
    return advancedAlgo();  // 冲击满分
}
\`\`\`

---

## 6.4 调试优先于重写

### 🕳️ 陷阱描述

代码出bug后，不经思考就重写整段代码，浪费大量时间且可能引入新bug。

### ✅ 科学调试法

1. **静态检查**（5分钟）- 边界、越界、初始化
2. **输出调试**（10分钟）- 关键位置添加输出
3. **对拍**（15分钟）- 暴力程序对比
4. **最后手段**- 逻辑完全错误时才重写

---

## 6.5 样例测试的幻觉

### 🕳️ 陷阱描述

只测试样例数据，不构造边界和特殊情况，导致交卷后才发现问题。

### ✅ 全面测试策略

- 样例测试（必做）
- 边界测试（n=0, n=1, 最大值）
- 随机测试（对拍）
- 特殊构造（星形、链、完全图）

---

## 6.6 代码可读性的代价

### 🕳️ 陷阱描述

过度追求代码简洁或"炫技"，牺牲可读性，导致调试困难和隐藏bug。

### ✅ 清晰编码原则

- 有意义的变量名
- 适当的注释
- 代码分段（输入、预处理、算法、输出）

---

## 6.7 心态崩盘的连锁反应

### 🕳️ 陷阱描述

一题失误或遇到难题后心态崩溃，影响后续题目的发挥。

### ✅ 心态管理策略

- 接受失误是正常的
- 隔离失误，B题是全新的开始
- 积极自我对话
- 物理放松（喝水、深呼吸）

---

## 6.8 文件操作与提交失误

### 🕳️ 陷阱描述

忘记删除调试代码、提交错误文件、或读写文件导致OJ上的RE/TLE。

### ✅ 提交前检查清单

- □ 删除了所有 freopen
- □ 关闭了所有调试输出
- □ 数组大小是否足够
- □ 是否有多余的输出

---

## 6.9 读题不细的理解偏差

### 🕳️ 陷阱描述

匆忙读题，忽略关键条件或误解题意，导致方向性错误。

### ✅ 精读策略

- 标记关键信息
- 用自己的话复述题意
- 列出数据范围表
- 手动模拟样例

---

## 6.10 忽视赛后复盘的价值

### 🕳️ 陷阱描述

比赛结束后只关注分数，不分析失误原因，导致同样的错误反复犯。

### ✅ 复盘模板

\`\`\`cpp
// 赛后复盘记录
/*
比赛：XXXX
成绩：XXX分

=== 做得好的 ===
=== 失误分析 ===
=== 新学到的 ===
=== 下次要注意 ===
*/
\`\`\`

---

> **卷六结语**：
> 
> 策略是隐形的代码，心态是无形的算法。
> 十个策略，十次对赛场智慧的锤炼。
> 愿你在代码之外，也能运筹帷幄。

### 陷阱

在线评测系统通常栈空间有限（如 8MB），递归过深会导致段错误。

// 2. 扩大栈空间（部分OJ支持）
#pragma comment(linker, "/STACK:1024000000")
\`\`\`
