> **卷首语**：
> 
> 「cin >>」四字看似简单，实则暗藏杀机。
> 多少人因一个空格WA，因一次TLE饮恨赛场。
> 此卷所录，皆为实战中血与泪换来的教训。

## 1.1 cin >> 的隐藏缓冲区

### 陷阱

cin 在读取字符串时，会以**空白字符**（空格、换行、制表符）作为分隔符。

### 错误示例

\`\`\`cpp
string s;
cin >> s;  // 输入 "hello world"，s 只得到 "hello"
\`\`\`

### 正确方案

\`\`\`cpp
// 方案1：使用 getline 读取整行
string s;
getline(cin, s);  // s = "hello world"

// 方案2：循环读取所有单词
string word;
while (cin >> word) {
    // 处理每个单词
}
\`\`\`

## 1.2 getline 与 cin 混用的灾难

### 陷阱

cin >> 会在输入流中留下换行符，随后调用 getline 会读取到这个空行。

### 错误示例

\`\`\`cpp
int n;
string s;
cin >> n;      // 输入 42\n，\n 留在缓冲区
getline(cin, s); // s = ""（空行！）
\`\`\`

### 正确方案

\`\`\`cpp
int n;
string s;
cin >> n;
cin.ignore();    // 清除缓冲区中的换行符
getline(cin, s); // 正常工作
\`\`\`

---

## 2.1 有符号整数的溢出

### 陷阱

有符号整数溢出是**未定义行为**（UB），编译器可以优化掉你的代码。

### 错误示例

\`\`\`cpp
int x = 1e9;
x *= 2;  // UB! 结果不可预测
\`\`\`

### 正确方案

\`\`\`cpp
// 使用 long long
long long x = 1e9;
x *= 2;  // OK: 2e9

// 或使用 int64_t
int64_t y = 1e9;
y *= 2;
\`\`\`

\`\`\`
